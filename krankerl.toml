[package]
# Commands run before packaging (rebuild from scratch in a clean environment)
before_cmds = [
    "composer install --no-dev --no-scripts --prefer-dist --no-progress",
    "npm ci",
    "npm run build",
]

# Files/dirs to exclude from the release tarball — everything not needed to run the
# app. README and the doc/ directory are read on GitHub (screenshots do not work
# from a local copy), and info.xml links to them. Kept: appinfo, lib, templates,
# img, js, vendor, l10n, LICENSES, CHANGELOG.md, REUSE.toml.
exclude = [
    ".git",
    ".github",
    ".gitignore",
    ".editorconfig",
    ".l10nignore",
    ".tx",
    ".eslintrc.cjs",
    ".stylelintrc.cjs",
    ".php-cs-fixer.dist.php",
    "babel.config.js",
    "webpack.config.js",
    "vitest.config.js",
    "psalm.xml",
    "phpunit.xml",
    "rector.php",
    "composer.json",
    "composer.lock",
    "package.json",
    "package-lock.json",
    "krankerl.toml",
    "Makefile",
    "README.md",
    "src",
    "tests",
    "tools",
    "vendor-bin",
    "doc",
    "build",
    "node_modules",
]
