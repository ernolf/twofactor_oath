name: PHPUnit mysql

on:
  pull_request:
    branches:
      - main
      - master
      - stable*

concurrency:
  group: phpunit-mysql-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  phpunit-mysql:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4', '8.5']
        server-version: ['stable32', 'stable33', 'stable34', 'master']
        exclude:
          # Nextcloud 33+ requires PHP >= 8.2
          - php-version: '8.1'
            server-version: 'stable33'
          - php-version: '8.1'
            server-version: 'stable34'
          - php-version: '8.1'
            server-version: 'master'
          # Nextcloud 32 supports up to PHP 8.4
          - php-version: '8.5'
            server-version: 'stable32'
          # Nextcloud master (35) requires PHP >= 8.3
          - php-version: '8.2'
            server-version: 'master'

    name: NC ${{ matrix.server-version }} php${{ matrix.php-version }} mysql

    services:
      mysql:
        image: mysql:8.4
        ports:
          - 4444:3306/tcp
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
        options: --health-cmd="mysqladmin ping" --health-interval 5s --health-timeout 2s --health-retries 5

    steps:
      - name: Set up php${{ matrix.php-version }}
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ctype,curl,dom,gd,iconv,intl,json,mbstring,openssl,pdo_mysql,posix,sqlite,xml,zip
          coverage: none

      - name: Checkout Nextcloud ${{ matrix.server-version }}
        run: git clone https://github.com/nextcloud/server.git --recursive --depth 1 -b ${{ matrix.server-version }} nextcloud

      - name: Checkout app
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          path: nextcloud/apps/twofactor_oath

      - name: Install app dependencies
        working-directory: nextcloud/apps/twofactor_oath
        run: composer install

      - name: Install Nextcloud
        run: php -f nextcloud/occ maintenance:install --verbose --database mysql --database-name nextcloud --database-host 127.0.0.1 --database-port 4444 --database-user root --database-pass rootpassword --admin-user admin --admin-pass admin

      - name: Enable app (runs the migration)
        run: php -f nextcloud/occ app:enable --force twofactor_oath

      - name: Run tests
        working-directory: nextcloud/apps/twofactor_oath
        run: composer run test:unit

  summary:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: phpunit-mysql

    if: always()

    name: phpunit-mysql-summary

    steps:
      - name: Summary status
        run: if ${{ needs.phpunit-mysql.result != 'success' }}; then exit 1; fi
